<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QC Attendance — Staff Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#0d1b2a;--navy2:#1a2a3d;--navy3:#223249;
  --gold:#f0a500;--gold2:#ffc93c;
  --green:#06d6a0;--red:#ef476f;--teal:#00b4d8;
  --white:#e8f4fd;--grey:#7a94a8;--line:rgba(240,165,0,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--navy);color:var(--white);font-family:'Nunito',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,180,216,0.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,180,216,0.03) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;}
.wrap{position:relative;z-index:1;width:100%;max-width:500px;padding:16px;}

.top-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.site-label{background:var(--navy2);border:1px solid var(--line);border-radius:8px;
  padding:8px 14px;font-family:'Rajdhani',sans-serif;font-size:12px;
  letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.clock-box{text-align:right;}
.c-time{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--gold);letter-spacing:2px;}
.c-date{font-size:11px;color:var(--grey);}

/* Location bar */
.loc-bar{background:var(--navy2);border:2px solid var(--gold);border-radius:14px;
  padding:16px;margin-bottom:16px;}
.loc-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.loc-row{display:flex;gap:8px;}
.loc-input{flex:1;background:var(--navy3);border:1px solid var(--line);border-radius:8px;
  padding:11px 14px;color:var(--white);font-family:'Nunito',sans-serif;font-size:14px;outline:none;}
.loc-input:focus{border-color:var(--gold);}
.loc-set{background:var(--gold);color:var(--navy);padding:11px 18px;border-radius:8px;
  border:none;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1px;cursor:pointer;white-space:nowrap;}
.loc-current{margin-top:8px;font-size:12px;color:var(--grey);}

/* Scan card */
.scan-card{background:var(--navy2);border:2px solid var(--line);border-radius:20px;
  padding:24px 20px;margin-bottom:16px;text-align:center;
  transition:border-color 0.3s,box-shadow 0.3s;}
.scan-card.s-scanning{border-color:var(--gold);box-shadow:0 0 30px rgba(240,165,0,0.2);}
.scan-card.s-success {border-color:var(--green);box-shadow:0 0 30px rgba(6,214,160,0.2);}
.scan-card.s-error   {border-color:var(--red);  box-shadow:0 0 30px rgba(239,71,111,0.2);}
.fp-ring{width:100px;height:100px;border-radius:50%;border:3px solid var(--line);
  margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:48px;
  transition:border-color 0.3s;}
.s-scanning .fp-ring{border-color:var(--gold);animation:pp 1s ease-in-out infinite;}
.s-success  .fp-ring{border-color:var(--green);}
.s-error    .fp-ring{border-color:var(--red);}
@keyframes pp{0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,0.4)}50%{box-shadow:0 0 0 12px rgba(240,165,0,0)}}
.scan-name{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;min-height:34px;}
.scan-msg{font-size:13px;color:var(--grey);min-height:18px;margin-bottom:18px;}
.action-row{display:flex;gap:10px;justify-content:center;}
.btn{padding:12px 24px;border-radius:10px;border:none;font-family:'Rajdhani',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-in{background:var(--green);color:var(--navy);}
.btn-out{background:var(--red);color:var(--white);}
.btn:active{transform:scale(0.97);}

/* Manual */
.manual-box{background:var(--navy2);border:1px solid var(--line);border-radius:14px;
  padding:16px;margin-bottom:16px;}
.m-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:3px;color:var(--grey);text-transform:uppercase;margin-bottom:10px;}
.m-row{display:flex;gap:8px;}
.m-input{flex:1;background:var(--navy3);border:1px solid var(--line);border-radius:8px;
  padding:12px 14px;color:var(--white);font-family:'Share Tech Mono',monospace;
  font-size:16px;outline:none;}
.m-input:focus{border-color:var(--gold);}
.m-go{background:var(--navy3);border:1px solid var(--gold);color:var(--gold);
  padding:12px 16px;border-radius:8px;font-family:'Rajdhani',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;border-width:1px;}
.m-go:hover{background:var(--gold);color:var(--navy);}

/* Log */
.mini-log{background:var(--navy2);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.ml-hd{background:var(--navy3);padding:10px 16px;
  font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;
  color:var(--grey);text-transform:uppercase;display:flex;justify-content:space-between;}
.log-count{background:var(--gold);color:var(--navy);border-radius:20px;
  padding:2px 8px;font-size:11px;font-weight:700;}
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid rgba(240,165,0,0.05);font-size:13px;}
.log-entry:last-child{border-bottom:none;}
.log-time{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--grey);min-width:58px;}
.log-name{flex:1;font-weight:600;}
.tag{padding:3px 8px;border-radius:4px;font-family:'Rajdhani',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;}
.tin {background:rgba(6,214,160,0.15);color:var(--green);}
.tout{background:rgba(239,71,111,0.15);color:var(--red);}
.tlate{background:rgba(239,71,111,0.2);color:var(--red);}
.empty-log{text-align:center;padding:20px;color:var(--grey);font-size:13px;font-style:italic;}

/* Offline */
.offline-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:var(--red);color:var(--white);padding:6px 16px;border-radius:20px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;
  transition:transform 0.3s;z-index:999;}
.offline-badge.show{transform:translateX(-50%) translateY(0);}

/* Change leader btn */
.change-leader{background:none;border:none;color:var(--grey);font-size:11px;
  cursor:pointer;text-decoration:underline;margin-top:4px;display:block;}

#fpInput{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;}
</style>
</head>
<body>

<div class="offline-badge" id="offlineBadge">⚠ OFFLINE — Will sync when online</div>
<input id="fpInput" type="text" autocomplete="off">

<div class="wrap">
  <div class="top-bar">
    <div>
      <div class="site-label" id="siteLabel">Leader: —</div>
      <button class="change-leader" onclick="changeLeader()">Change leader name</button>
    </div>
    <div class="clock-box">
      <div class="c-time" id="cTime">--:--:--</div>
      <div class="c-date" id="cDate">---</div>
    </div>
  </div>

  <!-- Daily location -->
  <div class="loc-bar">
    <div class="loc-label">📍 Today's Work Location</div>
    <div class="loc-row">
      <input class="loc-input" id="locInput" placeholder="e.g. Factory ABC / Client Nike"
             onkeydown="if(event.key==='Enter') setLocation()">
      <button class="loc-set" onclick="setLocation()">SET</button>
    </div>
    <div class="loc-current" id="locCurrent">⚠️ Set today's location before scanning</div>
  </div>

  <!-- Scan card -->
  <div class="scan-card" id="scanCard">
    <div class="fp-ring">🫆</div>
    <div class="scan-name" id="scanName">Ready to Scan</div>
    <div class="scan-msg"  id="scanMsg">Place finger on ZKTeco reader or enter ID below</div>
    <div class="action-row">
      <button class="btn btn-in"  onclick="triggerManual('IN')">Clock In</button>
      <button class="btn btn-out" onclick="triggerManual('OUT')">Clock Out</button>
    </div>
  </div>

  <!-- Manual -->
  <div class="manual-box">
    <div class="m-label">Manual ID Entry</div>
    <div class="m-row">
      <input class="m-input" id="manId" placeholder="QC-01"
             onkeydown="if(event.key==='Enter') triggerManual('AUTO')">
      <button class="m-go" onclick="triggerManual('AUTO')">GO</button>
    </div>
  </div>

  <!-- Log -->
  <div class="mini-log">
    <div class="ml-hd">
      <span>Today's Records</span>
      <span class="log-count" id="logCount">0</span>
    </div>
    <div id="logBody"><div class="empty-log">No records yet today</div></div>
  </div>
</div>

<script>
// ── Firebase Config (hardcoded) ───────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCxQVBR258_VHR5OGZZO64UugmaTx1vads",
  authDomain:        "qc-attendance-77712.firebaseapp.com",
  projectId:         "qc-attendance-77712",
  storageBucket:     "qc-attendance-77712.firebasestorage.app",
  messagingSenderId: "1047572965496",
  appId:             "1:1047572965496:web:0d7fe557ed2e593e34258d"
};

// ── Constants ─────────────────────────────────────────────────────────────
const LEADER_KEY  = 'qcatt_leader';
const LOC_KEY     = 'qcatt_daily_loc';
const QUEUE_KEY   = 'qcatt_queue';
const CACHE_KEY   = 'qcatt_staff_cache';
const START_H=8, LATE_M=15;

let db=null, leader='', miniEntries=[];

// ── Init Firebase ─────────────────────────────────────────────────────────
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  db.enablePersistence({synchronizeTabs:true}).catch(e=>console.warn('Persistence:',e));
  console.log('Firebase OK');
} catch(e) {
  console.error('Firebase error:', e);
}

// ── Leader name ───────────────────────────────────────────────────────────
function initLeader() {
  leader = localStorage.getItem(LEADER_KEY) || '';
  if (!leader) {
    leader = prompt('Enter Team Leader name for this tablet:') || 'Unknown';
    localStorage.setItem(LEADER_KEY, leader);
  }
  document.getElementById('siteLabel').textContent = 'Leader: ' + leader;
}
function changeLeader() {
  const n = prompt('New team leader name:', leader);
  if (n && n.trim()) {
    leader = n.trim();
    localStorage.setItem(LEADER_KEY, leader);
    document.getElementById('siteLabel').textContent = 'Leader: ' + leader;
  }
}

// ── Daily location ────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }
function tsStr(d)   { return d.toTimeString().slice(0,8); }

function initLocation() {
  try {
    const s = JSON.parse(localStorage.getItem(LOC_KEY)||'null');
    if (s && s.date === todayStr()) {
      document.getElementById('locInput').value   = s.loc;
      document.getElementById('locCurrent').textContent = '✅ Today: ' + s.loc;
      document.getElementById('locCurrent').style.color = 'var(--green)';
    }
  } catch(e) {}
}
function setLocation() {
  const loc = document.getElementById('locInput').value.trim();
  if (!loc) { alert('Please enter today\'s work location.'); return; }
  localStorage.setItem(LOC_KEY, JSON.stringify({date:todayStr(), loc}));
  document.getElementById('locCurrent').textContent = '✅ Today: ' + loc;
  document.getElementById('locCurrent').style.color = 'var(--green)';
  setCard('success','Location Set ✅', loc + ' — ready to scan');
  document.getElementById('fpInput').focus();
}
function getLocation() {
  try {
    const s = JSON.parse(localStorage.getItem(LOC_KEY)||'null');
    if (s && s.date===todayStr()) return s.loc;
  } catch(e) {}
  return null;
}

// ── Clock ─────────────────────────────────────────────────────────────────
function updateClock() {
  const n=new Date();
  document.getElementById('cTime').textContent = tsStr(n);
  document.getElementById('cDate').textContent =
    n.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

// ── ZKTeco HID ────────────────────────────────────────────────────────────
let fpBuf='', fpTimer=null;
function setupHID() {
  const inp=document.getElementById('fpInput');
  document.addEventListener('click', e=>{
    const avoid=['locInput','manId'];
    if(!avoid.includes(e.target.id)) inp.focus();
  });
  inp.focus();
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      const id=fpBuf.trim(); fpBuf=''; inp.value='';
      clearTimeout(fpTimer);
      if(id) processId(id,'AUTO');
    } else if(e.key.length===1){
      fpBuf+=e.key;
      clearTimeout(fpTimer);
      fpTimer=setTimeout(()=>{
        const id=fpBuf.trim(); fpBuf=''; inp.value='';
        if(id.length>=2) processId(id,'AUTO');
      },600);
      setCard('scanning','Scanning...','Reading fingerprint...');
    }
  });
}

// ── Manual trigger ────────────────────────────────────────────────────────
function triggerManual(type) {
  const id=document.getElementById('manId').value.trim().toUpperCase();
  if(!id){setCard('error','Enter ID','Type an inspector ID first');return;}
  processId(id,type);
}

// ── Process ID ────────────────────────────────────────────────────────────
async function processId(fpId, type) {
  fpId = fpId.toUpperCase();

  if(!getLocation()){
    setCard('error','Set Location First','Enter today\'s work location before scanning');
    return;
  }

  // Look up staff
  let member = null;

  // Check local cache first (works offline)
  try {
    const cache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');
    if(cache[fpId]) member=cache[fpId];
  } catch(e){}

  // Try Firebase
  if(!member && db) {
    try {
      const snap=await db.collection('staff').where('code','==',fpId).limit(1).get();
      if(!snap.empty){
        member={id:snap.docs[0].id,...snap.docs[0].data()};
        // Update cache
        const cache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');
        cache[fpId]=member;
        localStorage.setItem(CACHE_KEY,JSON.stringify(cache));
      }
    } catch(e){ console.warn('Staff lookup failed (offline?):', e); }
  }

  if(!member){
    setCard('error','Unknown ID: '+fpId,'Not registered. Ask manager to add this inspector.');
    return;
  }

  await recordEntry(member, type);
}

// ── Record entry ──────────────────────────────────────────────────────────
async function recordEntry(member, type) {
  const now=new Date();
  const timeNow=tsStr(now);
  const today=todayStr();
  const loc=getLocation();

  // Determine IN or OUT
  let action=type;
  if(type==='AUTO'){
    const last=await getLastAction(member.code, today);
    action=(!last||last==='OUT')?'IN':'OUT';
  }

  // Late check
  const lateLimit=new Date(); lateLimit.setHours(START_H,LATE_M,0,0);
  const late=(action==='IN' && now>lateLimit);

  // Work hours
  let workHours='';
  if(action==='OUT'){
    const inTs=await getLastInTime(member.code,today);
    if(inTs){ const diff=(now-new Date(inTs))/3600000; workHours=diff.toFixed(2)+' hrs'; }
  }

  const entry={
    staffCode: member.code,
    staffName: member.name,
    staffId:   member.id||'',
    leader:    leader,
    site:      loc,
    date:      today,
    time:      timeNow,
    timestamp: now.toISOString(),
    action:    action,
    late:      late,
    workHours: workHours,
  };

  // Save to Firebase or queue
  let saved=false;
  if(db && navigator.onLine){
    try{
      await db.collection('attendance').add(entry);
      saved=true;
    } catch(e){ console.warn('Save failed, queuing:', e); }
  }
  if(!saved) queueEntry(entry);

  // UI feedback
  const name0=member.name.split(' ')[0];
  if(action==='IN'){
    setCard('success',
      (late?'⚠️ LATE — ':'✅ ')+name0,
      'Clocked IN at '+timeNow+(late?' — LATE':'')+(saved?'':' (offline, will sync)')
    );
  } else {
    setCard('success','🔴 '+name0,
      'Clocked OUT at '+timeNow+(workHours?' · '+workHours:'')+(saved?'':' (offline, will sync)')
    );
  }

  addMiniLog(entry);
  document.getElementById('manId').value='';
  document.getElementById('fpInput').focus();
  syncQueue();
}

// ── Last action helpers ───────────────────────────────────────────────────
async function getLastAction(code,date){
  // Check mini log first
  const local=miniEntries.filter(e=>e.staffCode===code&&e.date===date);
  if(local.length) return local[local.length-1].action;
  const q=getQueue().filter(e=>e.staffCode===code&&e.date===date);
  if(q.length) return q[q.length-1].action;
  if(!db) return null;
  try{
    const snap=await db.collection('attendance')
      .where('staffCode','==',code).where('date','==',date)
      .orderBy('timestamp','desc').limit(1).get();
    if(!snap.empty) return snap.docs[0].data().action;
  }catch(e){}
  return null;
}
async function getLastInTime(code,date){
  const local=miniEntries.filter(e=>e.staffCode===code&&e.date===date&&e.action==='IN');
  const q=getQueue().filter(e=>e.staffCode===code&&e.date===date&&e.action==='IN');
  const all=[...local,...q].sort((a,b)=>a.timestamp.localeCompare(b.timestamp));
  if(all.length) return all[0].timestamp;
  if(!db) return null;
  try{
    const snap=await db.collection('attendance')
      .where('staffCode','==',code).where('date','==',date).where('action','==','IN')
      .orderBy('timestamp','asc').limit(1).get();
    if(!snap.empty) return snap.docs[0].data().timestamp;
  }catch(e){}
  return null;
}

// ── Offline queue ─────────────────────────────────────────────────────────
function queueEntry(e){
  const q=getQueue(); q.push(e);
  localStorage.setItem(QUEUE_KEY,JSON.stringify(q));
}
function getQueue(){
  try{return JSON.parse(localStorage.getItem(QUEUE_KEY)||'[]');}catch(e){return [];}
}
async function syncQueue(){
  if(!db||!navigator.onLine) return;
  const q=getQueue(); if(!q.length) return;
  const rem=[];
  for(const e of q){
    try{ await db.collection('attendance').add(e); }
    catch(err){ rem.push(e); }
  }
  localStorage.setItem(QUEUE_KEY,JSON.stringify(rem));
}

// ── Mini log ──────────────────────────────────────────────────────────────
function addMiniLog(e){
  miniEntries.push(e);
  const body=document.getElementById('logBody');
  const rows=[...miniEntries].reverse().slice(0,15);
  body.innerHTML=rows.map(r=>`
    <div class="log-entry">
      <span class="log-time">${r.time}</span>
      <span class="log-name">${r.staffName}</span>
      ${r.late?'<span class="tag tlate">LATE</span>':''}
      <span class="tag ${r.action==='IN'?'tin':'tout'}">${r.action}</span>
    </div>`).join('');
  document.getElementById('logCount').textContent=miniEntries.length;
}

// ── Card state ────────────────────────────────────────────────────────────
let resetT=null;
function setCard(state,name,msg){
  const c=document.getElementById('scanCard');
  c.className='scan-card s-'+state;
  document.getElementById('scanName').textContent=name;
  document.getElementById('scanMsg').textContent=msg;
  clearTimeout(resetT);
  resetT=setTimeout(()=>{
    c.className='scan-card';
    document.getElementById('scanName').textContent='Ready to Scan';
    document.getElementById('scanMsg').textContent='Place finger on ZKTeco reader or enter ID below';
  },4000);
}

// ── Online/offline ────────────────────────────────────────────────────────
function updateOnline(){
  document.getElementById('offlineBadge').classList.toggle('show',!navigator.onLine);
  if(navigator.onLine) syncQueue();
}
window.addEventListener('online',  updateOnline);
window.addEventListener('offline', updateOnline);

// ── Start ─────────────────────────────────────────────────────────────────
initLeader();
initLocation();
setInterval(updateClock,1000);
updateClock();
updateOnline();
setupHID();
</script>
</body>
</html>
